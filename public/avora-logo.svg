<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&amp;display=swap');
    </style>
  </defs>
  <!-- Background with rounded corners (22%) -->
  <rect width="200" height="200" rx="44" fill="#1A5C5C"/>
  <!-- Subtle inner highlight -->
  <rect width="200" height="110" rx="44" fill="white" fill-opacity="0.05"/>
  <!--
    Letter "a" in mint teal, centered.
    Nunito ExtraBold 130px, text-anchor=middle, baseline y=162
    x-height ≈ 88px  →  top of letter ≈ y=74
  -->
  <text
    x="100"
    y="162"
    text-anchor="middle"
    font-family="'Nunito', 'Poppins', sans-serif"
    font-weight="800"
    font-size="130"
    fill="#4DB8B8"
  >a</text>
  <!--
    Coral dot centered in the bowl of the "a".
    For Nunito ExtraBold at 130px, the double-story "a" bowl center is
    approximately at (100, 138) with inner radius ≈ 14px.
  -->
  <circle cx="100" cy="138" r="14" fill="#FF5252"/>
</svg>
